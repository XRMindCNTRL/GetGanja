name: Deploy GetGanja (Customer App) to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - 'apps/customer-app/**'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/customer-app/**'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy GetGanja
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (customer-app)
        run: |
          cd apps/customer-app
          npm ci

      - name: Build customer-app
        run: |
          cd apps/customer-app
          npm run build

      - name: Deploy to Azure Static Web Apps
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ORANGE_MUD_083F9AC0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'apps/customer-app'
          output_location: 'build'

      - name: Deployment complete
        run: |
          echo "Deployment to GetGanja complete"
